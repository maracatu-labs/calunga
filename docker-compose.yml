# Requires the external "edge_proxy" network to be created once on the host:
#   docker network create edge_proxy
# In production it is created by the /srv/edge stack (Traefik + cloudflared).
# In development it is just an empty bridge that Traefik never connects to.

services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maracatu}
      POSTGRES_USER: ${POSTGRES_USER:-maracatu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maracatu}"]
      interval: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    networks: [calunga_internal]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    networks: [calunga_internal]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m

  api:
    build:
      context: ./terreiro
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-maracatu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-maracatu}
      REDIS_URL: redis://redis:6379/0
      CAMARA_API_URL: https://dadosabertos.camara.leg.br/api/v2
      TRANSPARENCIA_API_TOKEN: ${TRANSPARENCIA_API_TOKEN:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.5-flash}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_URL: ${APP_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Maracatu <noreply@maracatu.org>}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MAGIC_LINK_EMAIL_LIMIT_HOUR: ${MAGIC_LINK_EMAIL_LIMIT_HOUR:-3}
      MAGIC_LINK_IP_LIMIT_HOUR: ${MAGIC_LINK_IP_LIMIT_HOUR:-10}
      TOKEN_QUOTA_DAILY_INPUT: ${TOKEN_QUOTA_DAILY_INPUT:-200000}
      TOKEN_QUOTA_DAILY_OUTPUT: ${TOKEN_QUOTA_DAILY_OUTPUT:-50000}
      MAX_USER_MESSAGE_CHARS: ${MAX_USER_MESSAGE_CHARS:-8000}
      MAX_REQUEST_CHARS: ${MAX_REQUEST_CHARS:-60000}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./scripts:/scripts:ro
    networks: [calunga_internal, edge_proxy]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 2g
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge_proxy"
      - "traefik.http.routers.calunga-api.rule=(Host(`${CALUNGA_HOST:-localhost}`) || Host(`www.${CALUNGA_HOST:-localhost}`)) && (PathPrefix(`/v1`) || Path(`/health`))"
      - "traefik.http.routers.calunga-api.entrypoints=web"
      - "traefik.http.services.calunga-api.loadbalancer.server.port=8000"

  dagster-webserver:
    build:
      context: ./terreiro
      dockerfile: Dockerfile
    command: sh -c 'mkdir -p /tmp/dagster && touch /tmp/dagster/dagster.yaml && dagster-webserver -h 0.0.0.0 -p 3002 -m pipeline.definitions'
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maracatu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-maracatu}
      REDIS_URL: redis://redis:6379/0
      CAMARA_API_URL: https://dadosabertos.camara.leg.br/api/v2
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      TRANSPARENCIA_API_TOKEN: ${TRANSPARENCIA_API_TOKEN:-}
      DAGSTER_HOME: /tmp/dagster
    volumes:
      - dagster_home:/tmp/dagster
      - cnpj_cache:/tmp/cnpj_data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:3002"
    networks: [calunga_internal]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 1g

  dagster-daemon:
    build:
      context: ./terreiro
      dockerfile: Dockerfile
    command: sh -c 'mkdir -p /tmp/dagster && touch /tmp/dagster/dagster.yaml && dagster-daemon run -m pipeline.definitions'
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maracatu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-maracatu}
      REDIS_URL: redis://redis:6379/0
      CAMARA_API_URL: https://dadosabertos.camara.leg.br/api/v2
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      TRANSPARENCIA_API_TOKEN: ${TRANSPARENCIA_API_TOKEN:-}
      DAGSTER_HOME: /tmp/dagster
    volumes:
      - dagster_home:/tmp/dagster
      - cnpj_cache:/tmp/cnpj_data
    depends_on:
      db:
        condition: service_healthy
    networks: [calunga_internal]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 1g

  web:
    build:
      context: ./cortejo
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_SENTRY_DSN_WEB: ${NEXT_PUBLIC_SENTRY_DSN_WEB:-}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    networks: [calunga_internal, edge_proxy]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge_proxy"
      - "traefik.http.routers.calunga-web.rule=Host(`${CALUNGA_HOST:-localhost}`) || Host(`www.${CALUNGA_HOST:-localhost}`)"
      - "traefik.http.routers.calunga-web.entrypoints=web"
      - "traefik.http.routers.calunga-web.priority=1"
      - "traefik.http.services.calunga-web.loadbalancer.server.port=3000"

  pg-backup:
    image: eeshugerman/postgres-backup-s3:16
    restart: unless-stopped
    environment:
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      S3_REGION: auto
      S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      S3_BUCKET: ${R2_BUCKET}
      S3_PREFIX: postgres
      S3_ENDPOINT: ${R2_ENDPOINT}
      POSTGRES_HOST: db
      POSTGRES_DATABASE: ${POSTGRES_DB:-maracatu}
      POSTGRES_USER: ${POSTGRES_USER:-maracatu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks: [calunga_internal]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  calunga_internal:
    driver: bridge
  edge_proxy:
    external: true

volumes:
  pgdata:
  redisdata:
  dagster_home:
  cnpj_cache:
